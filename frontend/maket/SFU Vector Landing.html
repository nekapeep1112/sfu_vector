<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>СФУ.Вектор — Стань частью большего</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles/tokens.css?v=paper2"/>
<style>
  body { background: #FFFFFF; }
  html { scroll-behavior: smooth; }

  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  @keyframes shine { 0% { transform: translateX(-100%); } 60%,100% { transform: translateX(100%); } }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.6; } }
  @keyframes gradShift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
  @keyframes ping { 0% { transform: scale(0.95); opacity: 0.5; } 100% { transform: scale(1.5); opacity: 0; } }
  @keyframes mouseDrop { 0% { top: 6px; opacity: 1; } 70% { top: 22px; opacity: 0; } 100% { top: 6px; opacity: 0; } }
  @keyframes meshFloat1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(20px,-30px) scale(1.1); } }
  @keyframes meshFloat2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-25px,20px) scale(0.95); } }
  @keyframes meshFloat3 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(15px,15px) scale(1.05); } }
  @keyframes pointLeft { 0%,100% { transform: translateX(0); } 50% { transform: translateX(-4px); } }

  /* Card hover arrow shift */
  .card:hover .arrow-tx { transform: translateX(4px); }

  /* Marquee on hover slow down */
  .marquee-track:hover { animation-play-state: paused; }

  /* Smooth scroll snap for stories */
  .stories-track::-webkit-scrollbar { height: 6px; }
  .stories-track::-webkit-scrollbar-track { background: var(--bg-3); border-radius: 3px; }
  .stories-track::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/Logo.jsx"></script>
<script type="text/babel" src="components/data.jsx"></script>
<script type="text/babel" src="landing/data.jsx"></script>
<script type="text/babel" src="landing/sections.jsx"></script>

<script type="text/babel">
function Landing() {
  return (
    <div data-screen-label="Landing">
      <LandingNav/>
      <HeroSection/>
      <MarqueeStrip/>
      <FeaturesSection/>
      <AudiencesSection/>
      <HowSection/>
      <NumbersSection/>
      <StoriesSection/>
      <CtaSection/>
      <LandingFooter/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Landing/>);
</script>
</body>
</html>
